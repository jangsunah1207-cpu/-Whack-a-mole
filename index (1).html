<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두더지 잡기 🌱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#8fd3f4;
    --sky-bottom:#c9f2b8;
    --grass:#5fb244;
    --grass-dark:#428a30;
    --dirt:#7a5334;
    --dirt-dark:#4e3520;
    --dirt-rim:#3a2717;
    --mole-fur:#8a6a4e;
    --mole-fur-dark:#6b5038;
    --mole-belly:#e9d2ae;
    --sun:#f6c744;
    --ink:#2e2417;
    --card:#fff8ea;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, var(--grass) 55%, var(--grass-dark) 100%);
    font-family:'Nunito Sans', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 50px;
    overflow-x:hidden;
    cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><text y="30" font-size="30">🔨</text></svg>') 10 30, auto;
  }

  header{
    text-align:center;
    margin-bottom:14px;
  }

  .eyebrow{
    font-size:0.76rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:#2e6b1f;
    font-weight:800;
  }

  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(2rem, 6vw, 2.9rem);
    margin:6px 0 4px;
    color:#2e4a1c;
    text-shadow:0 2px 0 rgba(255,255,255,0.4);
  }

  p.sub{
    margin:0;
    color:#3a5a28;
    font-weight:700;
  }

  .hud{
    display:flex;
    gap:14px;
    margin:18px 0 8px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .pill{
    background:var(--card);
    border-radius:16px;
    padding:10px 20px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    box-shadow:0 4px 0 rgba(0,0,0,0.12);
    display:flex;
    align-items:center;
    gap:8px;
    min-width:120px;
    justify-content:center;
  }
  .pill .sun-icon{ color:var(--sun); font-size:1.2rem; }

  .board-wrap{
    position:relative;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:22px;
    padding:26px;
    background:linear-gradient(180deg, #6fbf4a, #4d9b34);
    border-radius:28px;
    box-shadow:0 10px 0 rgba(0,0,0,0.18), inset 0 -6px 0 rgba(0,0,0,0.08);
  }

  .hole{
    position:relative;
    width:104px;
    height:104px;
    border-radius:50%;
    background:radial-gradient(ellipse at 50% 40%, var(--dirt), var(--dirt-dark) 75%);
    box-shadow:inset 0 8px 14px rgba(0,0,0,0.45), inset 0 -4px 0 var(--dirt-rim);
    overflow:hidden;
    cursor:pointer;
  }

  .mole{
    position:absolute;
    left:50%;
    bottom:-92px;
    transform:translateX(-50%);
    width:78px;
    height:96px;
    transition:bottom 0.16s cubic-bezier(.34,1.56,.64,1);
  }
  .hole.up .mole{
    bottom:8px;
  }
  .hole.hit .mole{
    bottom:-10px;
    transform:translateX(-50%) scale(0.85, 0.6);
    transition:all 0.12s ease-out;
  }

  .mole-head{
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:70px;
    height:62px;
    background:var(--mole-fur);
    border-radius:50% 50% 46% 46%;
    border:3px solid var(--mole-fur-dark);
  }
  .mole-cheek{
    position:absolute;
    bottom:8px;
    width:22px;
    height:16px;
    background:var(--mole-belly);
    border-radius:50%;
  }
  .mole-cheek.l{ left:2px; }
  .mole-cheek.r{ right:2px; }
  .mole-nose{
    position:absolute;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    width:16px;
    height:12px;
    background:#e78aa0;
    border-radius:50%;
  }
  .mole-eye{
    position:absolute;
    top:20px;
    width:7px;
    height:7px;
    background:#1c140c;
    border-radius:50%;
  }
  .mole-eye.l{ left:20px; }
  .mole-eye.r{ right:20px; }
  .hole.hit .mole-eye{
    height:2px;
    top:23px;
    border-radius:2px;
  }
  .mole-body{
    position:absolute;
    top:48px;
    left:50%;
    transform:translateX(-50%);
    width:60px;
    height:50px;
    background:var(--mole-fur);
    border:3px solid var(--mole-fur-dark);
    border-radius:40% 40% 50% 50%;
  }

  .star{
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%) scale(0);
    font-size:1.4rem;
    pointer-events:none;
  }
  .hole.hit .star{
    animation:pop 0.5s ease-out forwards;
  }
  @keyframes pop{
    0%{ transform:translateX(-50%) scale(0) translateY(0); opacity:1; }
    60%{ transform:translateX(-50%) scale(1.3) translateY(-30px); opacity:1; }
    100%{ transform:translateX(-50%) scale(1) translateY(-46px); opacity:0; }
  }

  .controls{
    margin-top:22px;
    display:flex;
    gap:12px;
  }

  button{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1rem;
    padding:13px 26px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    background:var(--sun);
    color:#4a3410;
    box-shadow:0 4px 0 #c99a1e;
    transition:transform 0.1s ease, box-shadow 0.1s ease;
  }
  button:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 #c99a1e;
  }

  .overlay{
    position:absolute;
    inset:0;
    background:rgba(30,20,10,0.55);
    border-radius:28px;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#fff;
    text-align:center;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .overlay h2{
    font-family:'Baloo 2', sans-serif;
    font-size:2rem;
    margin:0 0 8px;
  }
  .overlay p{
    margin:0 0 16px;
    font-weight:700;
    font-size:1.1rem;
  }

  @media (max-width:480px){
    .hole{ width:78px; height:78px; }
    .mole{ width:58px; height:72px; }
    .board{ gap:14px; padding:16px; }
  }
</style>
</head>
<body>

  <header>
    <div class="eyebrow">Garden Arcade</div>
    <h1>두더지 잡기 🌱</h1>
    <p class="sub">쏙 나오는 두더지를 재빠르게 클릭하세요!</p>
  </header>

  <div class="hud">
    <div class="pill"><span class="sun-icon">⭐</span><span id="score">0</span></div>
    <div class="pill">⏱ <span id="time">30</span>초</div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay">
      <h2>게임 종료!</h2>
      <p id="finalScore">최종 점수: 0점</p>
      <button id="restartBtn">다시 하기</button>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn">게임 시작</button>
  </div>

<script>
  const board = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const startBtn = document.getElementById('startBtn');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('finalScore');
  const restartBtn = document.getElementById('restartBtn');

  const HOLE_COUNT = 9;
  let holes = [];
  let score = 0;
  let timeLeft = 30;
  let gameTimer = null;
  let popTimer = null;
  let running = false;

  function buildBoard(){
    board.innerHTML = '';
    holes = [];
    for(let i=0;i<HOLE_COUNT;i++){
      const hole = document.createElement('div');
      hole.className = 'hole';
      hole.innerHTML = `
        <div class="mole">
          <div class="mole-body"></div>
          <div class="mole-head">
            <div class="mole-eye l"></div>
            <div class="mole-eye r"></div>
            <div class="mole-cheek l"></div>
            <div class="mole-cheek r"></div>
            <div class="mole-nose"></div>
          </div>
          <div class="star">✨</div>
        </div>
      `;
      hole.addEventListener('click', () => whack(hole));
      board.appendChild(hole);
      holes.push(hole);
    }
  }

  function randomHole(){
    const upHoles = holes.filter(h => !h.classList.contains('up') && !h.classList.contains('hit'));
    if(upHoles.length === 0) return;
    const hole = upHoles[Math.floor(Math.random() * upHoles.length)];
    hole.classList.add('up');
    const stayTime = Math.max(500, 1000 - score * 12);
    setTimeout(() => {
      hole.classList.remove('up');
    }, stayTime);
  }

  function whack(hole){
    if(!running) return;
    if(!hole.classList.contains('up')) return;
    hole.classList.remove('up');
    hole.classList.add('hit');
    score++;
    scoreEl.textContent = score;
    setTimeout(() => hole.classList.remove('hit'), 400);
  }

  function startGame(){
    buildBoard();
    score = 0;
    timeLeft = 30;
    scoreEl.textContent = 0;
    timeEl.textContent = 30;
    overlay.classList.remove('show');
    running = true;
    startBtn.disabled = true;
    startBtn.textContent = '게임 진행 중...';

    popTimer = setInterval(() => {
      randomHole();
    }, 700);

    gameTimer = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if(timeLeft <= 0){
        endGame();
      }
    }, 1000);
  }

  function endGame(){
    running = false;
    clearInterval(gameTimer);
    clearInterval(popTimer);
    holes.forEach(h => h.classList.remove('up'));
    finalScoreEl.textContent = `최종 점수: ${score}점`;
    overlay.classList.add('show');
    startBtn.disabled = false;
    startBtn.textContent = '게임 시작';
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  buildBoard();
</script>

</body>
</html>
